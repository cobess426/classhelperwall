<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2422班学习互助解答墙 - 首页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }

        .navbar {
            background-color: #87CEEB;
            padding: 0 20px;
            height: 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .navbar-title {
            font-family: "楷体", KaiTi, serif;
            font-size: 24px;
            color: white;
            text-align: center;
            flex-grow: 1;
            line-height: 60px;
        }

        .ranking-button {
            background-color: white;
            color: #87CEEB;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background-color 0.3s;
        }

        .ranking-button:hover {
            background-color: #f0f0f0;
        }

        .main-content {
            display: flex;
            justify-content: space-around;
            align-items: center;
            min-height: calc(100vh - 60px);
            padding: 40px 20px;
            gap: 20px;
        }

        .area-link {
            width: 45%;
            max-width: 500px;
            height: 300px;
            background: linear-gradient(135deg, #e6f7ff, #ffffff);
            border: 3px solid #87CEEB;
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            font-size: 42px;
            font-weight: bold;
            color: #333;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .area-link:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        }

        .ask-area {
            color: #0066cc;
        }

        .answer-area {
            color: #009933;
        }

        @media (max-width: 768px) {
            .main-content {
                flex-direction: column;
                gap: 30px;
            }
            .area-link {
                width: 90%;
                height: 250px;
                font-size: 36px;
            }
            .navbar-title {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <header class="navbar">
        <div class="navbar-title">2422学习互助解答墙</div>
        <button class="ranking-button" id="rankingBtn">排行榜</button>
    </header>

    <main class="main-content">
        <a href="ask.html" class="area-link ask-area">提问区</a>
        <a href="answer.html" class="area-link answer-area">解答区</a>
    </main>

    <script>
        document.getElementById('rankingBtn').addEventListener('click', function() {
            window.location.href = 'ranking.html';
        });
    </script>
</body>
</html>
