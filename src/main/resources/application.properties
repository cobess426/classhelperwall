# 服务器配置
server.port=8080

# 文件上传
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=20MB

# 数据库
spring.datasource.url=jdbc:mysql://localhost:3306/class_helper?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
spring.datasource.username=root
spring.datasource.password=0422
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# MyBatis
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.example.classhelper.entity
mybatis.configuration.map-underscore-to-camel-case=true


# 上传文件存储路径（Windows系统请使用双反斜杠或正斜杠）
app.upload.local-path=D:/class_helper_uploads/
app.upload.url-prefix=http://localhost:8080/api/uploads/